name: Build Mod JAR

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Setup Gradle
        run: |
          chmod +x gradlew
          ./gradlew wrapper --gradle-version 8.5
      
      - name: Build Mod
        run: ./gradlew build
      
      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: autodeposit-mod
          path: build/libs/*.jar
